<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seu Carrinho</title>
    <link rel="stylesheet" href="cafe.css">
</head>
<body>

<header id="cabecalho-cafe">
    <h1>Seu Carrinho</h1>
    <nav>
        <a href="iniciocafe.html">Início</a>
        <a href="cardapio.html">Cardápio</a>
        <a href="carrinhocafe.html">Carrinho</a>
        <a href="contacafe.html">Minha Conta</a>
    </nav>
</header>

<main class="miolo-da-pagina">

<section class="caixa-de-compra">

<h2>Itens no carrinho</h2>

<table class="tabela-carrinho">
    <tr>
        <th>Produto</th>
        <th>Quantidade</th>
        <th>Preço</th>
        <th>Ação</th>
    </tr>

    <tr>
        <td>Cappuccino</td>

        <td class="controle-qtd">
            <button class="btn-qtd">-</button>
            <span>1</span>
            <button class="btn-qtd">+</button>
        </td>

        <td class="preco">R$ 8,00 (unidade)</td>

        <td>
            <a href="#" class="btn-remover">Remover</a>
        </td>
    </tr>

    <tr>
        <td>Pão de queijo</td>

        <td class="controle-qtd">
            <button class="btn-qtd">-</button>
            <span>2</span>
            <button class="btn-qtd">+</button>
        </td>

        <td class="preco">R$ 8,00 (unidade)</td>

        <td>
            <a href="#" class="btn-remover">Remover</a>
        </td>
    </tr>

</table>

</section>

<section class="caixa-de-compra">

<h2>Total do pedido</h2>
<p class="valor-final">R$ 24,00</p>

<a href="contacafe.html" class="botao-pedido">Finalizar Pedido</a>

</section>

</main>

</body>
</html>
