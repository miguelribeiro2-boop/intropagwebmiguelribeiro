<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Hype Esportes</title>
    <link rel="stylesheet" href="hype.css">
</head>

<body>

<header class="topo">
    <div class="topo-container">

        <div class="logo">
            <img src="hypelogo.jpg" alt="Logo Hype" width="70px">
        </div>

        <div class="busca">
            <input type="text" placeholder="Pesquisar camisas, seleções, clubes...">
            <button>🔍</button>
        </div>

        <div class="acoes">
            <a href="conta.html" class="acao">Minha Conta</a>
            <a href="carrinho.html" class="acao">Meu Carrinho</a>
        </div>

    </div>

    <nav class="menu">
        <a href="home.html">Home</a>
        <a href="produtos.html">Produtos</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>


<main class="conteudo">

    <h2 class="titulo-pagina">Catálogo Completo</h2>

    <section class="produtos">

        <div class="card">
            <img src="barcelona.jpg" alt="Camisa Barcelona">
            <h3>Camisa Barcelona</h3>
            <p class="preco">R$199,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="realmadrid.jpg" alt="Camisa Real Madrid">
            <h3>Camisa Real Madrid</h3>
            <p class="preco">R$199,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="camisa1.jpg" alt="Camisa Brasil Casa">
            <h3>Camiseta do Brasil (casa) 2026/27</h3>
            <p class="preco">R$179,90</p>
            <button>Comprar</button>
        </div>

        <div class="card">
            <img src="camisa2.jpg" alt="Camisa Brasil Jogador">
            <h3>Camisa Brasil 2026 (casa) Modelo Jogador</h3>
            <p class="preco">R$199,90</p>
            <button>Comprar</button>
        </div>

    </section>

</main>


<footer class="rodape">
    <p>© 2026 Hype Esportes - Todos os direitos reservados</p>
</footer>

</body>
</html>
