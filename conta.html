<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Hype Esportes</title>
    <link rel="stylesheet" href="hype.css">
</head>

<body>

<header class="topo">
    <div class="topo-container">

        <div class="logo">
            <img src="hypelogo.jpg" alt="Logo Hype" width="70px">
        </div>

        <div class="busca">
            <input type="text" placeholder="Pesquisar camisas, seleções, clubes...">
            <button>🔍</button>
        </div>

        <div class="acoes">
            <a href="conta.html" class="acao">Minha Conta</a>
            <a href="carrinho.html" class="acao">Meu Carrinho</a>
        </div>

    </div>

    <nav class="menu">
        <a href="home.html">Home</a>
        <a href="produtos.html">Produtos</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>


<main class="conteudo">

    <h2 class="titulo-pagina">Minha Conta</h2>

    <section class="conta-area">

        <div class="caixa-form">
            <h3>Entrar</h3>

            <form>
                <label>Email</label>
                <input type="email" placeholder="Digite seu email" required>

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" required>

                <button type="submit">Entrar</button>
            </form>

            <p class="texto-ajuda">Esqueceu sua senha? <a href="#">Clique aqui</a></p>
        </div>


        <div class="caixa-form">
            <h3>Criar Conta</h3>

            <form>
                <label>Nome Completo</label>
                <input type="text" placeholder="Digite seu nome completo" required>

                <label>Email</label>
                <input type="email" placeholder="Digite seu email" required>

                <label>Senha</label>
                <input type="password" placeholder="Crie uma senha" required>

                <button type="submit">Cadastrar</button>
            </form>

            <p class="texto-ajuda">Ao se cadastrar você aceita nossos <a href="#">termos</a>.</p>
        </div>

    </section>

</main>


<footer class="rodape">
    <p>© 2026 Hype Esportes - Todos os direitos reservados</p>
</footer>

</body>
</html>
