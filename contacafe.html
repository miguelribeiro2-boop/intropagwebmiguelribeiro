<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta</title>
    <link rel="stylesheet" href="cafe.css">
</head>
<body>

<header id="cabecalho-cafe">
    <h1>Minha Conta</h1>
    <nav>
        <a href="iniciocafe.html">Início</a>
        <a href="cardapio.html">Cardápio</a>
        <a href="carrinhocafe.html">Carrinho</a>
        <a href="contacafe.html">Minha Conta</a>
    </nav>
</header>

<main class="miolo-da-pagina">

    <section class="caixa-de-compra">
        <h2>Entrar na conta</h2>
        <form class="formulario-cafe">
            <label for="email-login">E-mail</label>
            <input type="email" id="email-login" placeholder="Digite seu e-mail">

            <label for="senha-login">Senha</label>
            <input type="password" id="senha-login" placeholder="Digite sua senha">

            <a href="#" class="botao-pedido">Entrar</a>
        </form>
    </section>

    <section class="caixa-de-compra">
        <h2>Criar cadastro</h2>
        <form class="formulario-cafe">
            <label for="nome-cadastro">Nome completo</label>
            <input type="text" id="nome-cadastro" placeholder="Digite seu nome">

            <label for="email-cadastro">E-mail</label>
            <input type="email" id="email-cadastro" placeholder="Digite seu e-mail">

            <label for="senha-cadastro">Crie uma senha</label>
            <input type="password" id="senha-cadastro" placeholder="Crie sua senha">

            <label for="telefone-cadastro">Telefone</label>
            <input type="text" id="telefone-cadastro" placeholder="Digite seu telefone">

            <a href="#" class="botao-pedido">Cadastrar</a>
        </form>
    </section>

</main>

</body>
</html>
